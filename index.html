<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magiczne Ciasteczko Wróżby | Twój Moment Zen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
--bg-color: #fcf8f2;
--cookie-color: #e5b26d;
--cookie-shadow: #c9934e;
--text-dark: #2c2520;
--gold: #c5a059;
--paper-bg: #fffdfa;
}

* {
box-sizing: border-box;
margin: 0;
padding: 0;
}

body {
font-family: 'Montserrat', sans-serif;
background: radial-gradient(circle at center, #ffffff 0%, var(--bg-color) 100%);
min-height: 100vh;
display: flex;
flex-direction: column;
justify-content: space-between;
align-items: center;
overflow: hidden;
color: var(--text-dark);
padding: 2rem;
}

header {
text-align: center;
max-width: 600px;
z-index: 10;
}

header h1 {
font-family: 'Cormorant Garamond', serif;
font-size: 2.5rem;
font-weight: 600;
letter-spacing: 1px;
margin-bottom: 0.5rem;
color: var(--text-dark);
}

header p {
font-size: 0.9rem;
text-transform: uppercase;
letter-spacing: 2px;
color: var(--gold);
font-weight: 500;
}

/* Główny kontener sceny */
.cookie-container {
position: relative;
width: 350px;
height: 350px;
display: flex;
justify-content: center;
align-items: center;
cursor: pointer;
perspective: 1000px;
}

/* Stylizacja Ciasteczka (CSS Art) */
.fortune-cookie {
position: relative;
width: 220px;
height: 180px;
transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
display: flex;
justify-content: center;
align-items: center;
z-index: 5;
}

.cookie-container:hover .fortune-cookie:not(.opened) {
transform: scale(1.08) rotate(2deg);
}

.cookie-container:active .fortune-cookie:not(.opened) {
transform: scale(0.98);
}

/* Połówki ciasteczka */
.cookie-left, .cookie-right {
position: absolute;
width: 140px;
height: 180px;
background: var(--cookie-color);
border-radius: 120px 40px 40px 120px;
box-shadow: inset -15px 0 25px var(--cookie-shadow), 0 10px 20px rgba(0,0,0,0.08);
transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
top: 0;
}

.cookie-left {
left: 0;
transform-origin: left center;
}

.cookie-right {
right: 0;
border-radius: 40px 120px 120px 40px;
box-shadow: inset 15px 0 25px var(--cookie-shadow), 0 10px 20px rgba(0,0,0,0.08);
transform-origin: right center;
}

/* Charakterystyczne zgięcie ciasteczka fortune */
.cookie-left::after, .cookie-right::after {
content: '';
position: absolute;
width: 50px;
height: 50px;
background: var(--cookie-shadow);
opacity: 0.3;
border-radius: 50%;
top: 65px;
}
.cookie-left::after { right: 10px; }
.cookie-right::after { left: 10px; }

/* Stan po otwarciu */
.fortune-cookie.opened .cookie-left {
transform: translateX(-120px) rotate(-35deg);
opacity: 0.75;
}

.fortune-cookie.opened .cookie-right {
transform: translateX(120px) rotate(35deg);
opacity: 0.75;
}

/* Karteczka z wróżbą */
.fortune-paper {
position: absolute;
width: 280px;
max-height: 0;
background: var(--paper-bg);
box-shadow: 0 4px 15px rgba(0,0,0,0.05);
border-left: 3px solid var(--gold);
border-right: 3px solid var(--gold);
padding: 0 1.5rem;
text-align: center;
opacity: 0;
transform: scale(0.4) rotate(-5deg);
transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
transition-delay: 0.2s;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
z-index: 2;
overflow: hidden;
}

.fortune-paper.reveal {
opacity: 1;
max-height: 180px;
padding: 1.5rem;
transform: scale(1) rotate(0deg);
box-shadow: 0 10px 30px rgba(197, 160, 89, 0.15), 0 1px 3px rgba(0,0,0,0.02);
}

.fortune-text {
font-family: 'Cormorant Garamond', serif;
font-size: 1.25rem;
font-weight: 600;
line-height: 1.5;
color: var(--text-dark);
font-style: italic;
}

.fortune-decor {
margin-top: 0.75rem;
color: var(--gold);
font-size: 0.8rem;
letter-spacing: 3px;
}

/* Przycisk resetu */
.reset-btn {
background: none;
border: 1px solid var(--gold);
color: var(--text-dark);
padding: 0.75rem 2rem;
font-family: 'Montserrat', sans-serif;
font-size: 0.8rem;
text-transform: uppercase;
letter-spacing: 2px;
cursor: pointer;
border-radius: 50px;
transition: all 0.3s ease;
opacity: 0;
transform: translateY(20px);
pointer-events: none;
margin-top: 1rem;
}

.reset-btn.show {
opacity: 1;
transform: translateY(0);
pointer-events: auto;
}

.reset-btn:hover {
background: var(--gold);
color: white;
box-shadow: 0 5px 15px rgba(197, 160, 89, 0.3);
}

footer {
font-size: 0.75rem;
letter-spacing: 1px;
color: #a0958d;
text-align: center;
}

/* Delikatna animacja unoszenia ciasteczka na start */
@keyframes float {
0% { transform: translateY(0px); }
50% { transform: translateY(-8px); }
100% { transform: translateY(0px); }
}

.fortune-cookie:not(.opened) {
animation: float 4s ease-in-out infinite;
}
</style>
</head>
<body>

<header>
<h1>Magiczne Ciasteczko</h1>
<p>Dotknij, aby poznać swoją myśl na dziś</p>
</header>

<div class="cookie-container" id="stage">
<div class="fortune-cookie" id="cookie">
<div class="cookie-left"></div>
<div class="cookie-right"></div>
</div>

<div class="fortune-paper" id="paper">
<div class="fortune-text" id="fortuneText">Twoja myśl za chwilę się pojawi...</div>
<div class="fortune-decor">✦ 𓆸 ✦</div>
</div>
</div>

<button class="reset-btn" id="resetBtn">Złam kolejne ciasteczko</button>

<footer>
&copy; 2026 Twój Rytuał Spokoju. Wszelkie prawa zastrzeżone.
</footer>

const cookie = document.getElementById('cookie');
const paper = document.getElementById('paper');
const fortuneText = document.getElementById('fortuneText');
const resetBtn = document.getElementById('resetBtn');

let isOpened = false;

stage.addEventListener('click', () => {
if (isOpened) return;

isOpened = true;

// Losowanie sentencji
const randomIndex = Math.floor(Math.random() * fortunes.length);
fortuneText.innerText = fortunes[randomIndex];

// Animacja ciasteczka i karteczki
cookie.classList.add('opened');

setTimeout(() => {
paper.classList.add('reveal');
resetBtn.classList.add('show');
}, 300);
});

resetBtn.addEventListener('click', (e) => {
e.stopPropagation(); // Zapobiega natychmiastowemu ponownemu kliknięciu sceny

isOpened = false;
paper.classList.remove('reveal');
cookie.classList.remove('opened');
resetBtn.classList.remove('show');
});
